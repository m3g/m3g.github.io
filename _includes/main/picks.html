<div class="pick-container pick-slider" id="research-pick">
  <h3 class="pick-title">Research Pick</h3>
  <p class="pick-text" id="research-pick-text"></p>
  <p class="pick-link-wrapper"><a href="#" target="_blank" class="pick-link" id="research-pick-link">[click here]</a></p>
  <div class="slideshow-track pick-slideshow-track" id="research-pick-track"></div>
  <div class="slideshow-dots" id="research-pick-dots"></div>
</div>

<script>
(function () {
  var picks = [
    {
      text: "PDBTools.jl: High-Performance Package for Molecular Structure File Handling and Analysis",
      link: "https://pubs.acs.org/doi/10.1021/acs.jcim.6c00847",
      img: "/main/picks/pdbtools.png"
    },
    {
      text: "Osmolyte structural and thermodynamic effects accross the protein folding landscape.",
      link: "https://pubs.acs.org/doi/10.1021/jacsau.5c00813",
      img: "/main/page_images/pereira2025.png"
    },
    {
      text: "CellListMap.jl: Computing custom pairwise interactions",
      link: "https://m3g.github.io/CellListMap.jl",
      img: "/main/picks/celllistmap.svg"
    },
    {
      text: "Statistical force-field for XL distance constraints.",
      link: "https://doi.org/10.1093/bioinformatics/btz013",
      img: "/main/picks/xlff.png"
    },
    {
      text: "Cation Hydrophobicity Effects on Protein Solvation in Aqueous Ionic Liquids.",
      link: "https://pubs.acs.org/doi/10.1021/acs.jpcb.5c00779",
      img: "/main/publications/2025_jpcb_capa.png"
    },
    {
      text: "Solvation structure of complex solutes by means of minimum distance distribution functions.",
      link: "http://m3g.iqm.unicamp.br/ComplexMixtures",
      img: "https://m3g.github.io/packmol/highlights/mddf.png"
    },
    {
      text: "Automatic identification of mobile substructures in protein MD simulations.",
      link: "https://m3g.github.io/mdlovofit",
      img: "https://m3g.github.io/packmol/mdlovofit.png"
    },
    {
      text: "TopoLink: Find the shortest path at a protein surface for XL evaluation.",
      link: "https://m3g.github.io/topolink",
      img: "/main/picks/topolink_drawing.png"
    },
    {
      text: "Molecular Basis for Solvation Structure and Thermodynamics of Polyacrylamide in Aqueous Solutions of Glucose.",
      link: "https://pubs.acs.org/doi/10.1021/acs.macromol.5c03031",
      img: "/main/page_images/mourao2026.jpg"
    }
  ];
  var track = document.getElementById('research-pick-track');
  var dotsContainer = document.getElementById('research-pick-dots');
  var text = document.getElementById('research-pick-text');
  var link = document.getElementById('research-pick-link');
  if (!track || !dotsContainer || !text || !link || picks.length === 0) return;

  var current = Math.floor(Math.random() * picks.length);
  var timer;

  picks.forEach(function (pick, i) {
    var slide = document.createElement('div');
    slide.className = 'slideshow-slide' + (i === current ? ' active' : '');

    var img = document.createElement('img');
    img.src = pick.img;
    img.alt = pick.text;
    img.className = 'pick-image';
    slide.appendChild(img);
    track.appendChild(slide);

    var dot = document.createElement('button');
    dot.className = 'slideshow-dot' + (i === current ? ' active' : '');
    dot.setAttribute('aria-label', 'Research pick ' + (i + 1));
    dot.addEventListener('click', function () { goTo(i); });
    dotsContainer.appendChild(dot);
  });

  var slides = track.querySelectorAll('.slideshow-slide');
  var dots = dotsContainer.querySelectorAll('.slideshow-dot');

  function renderPick() {
    var pick = picks[current];
    text.textContent = pick.text;
    link.href = pick.link;
  }

  function goTo(n) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (n + slides.length) % slides.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
    renderPick();
    resetTimer();
  }

  function resetTimer() {
    clearInterval(timer);
    timer = setInterval(function () { goTo(current + 1); }, 3000);
  }

  renderPick();
  resetTimer();
})();
</script>
